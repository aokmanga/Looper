<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Looper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px 20px 12px 20px;
      background-color: #13131a;
      color: #e3e3e6;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      gap: 10px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      font-family: 'Courier New', monospace;
    }

    h1 span {
      color: #007aff;
    }

    /* DISPLAY TEMPO */
    #timeDisplay {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.5rem;
      color: #007aff;
      font-weight: bold;
      background-color: #1c1c24;
      padding: 4px 14px;
      border-radius: 6px;
      border: 1px solid #2a2a35;
      letter-spacing: 2px;
    }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background-color: #1c1c24;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #2a2a35;
    }

    .divider {
      width: 1px;
      height: 22px;
      background-color: #3a3a48;
      margin: 0 4px;
      flex-shrink: 0;
    }

    button {
      background-color: #2a2a38;
      color: #ccc;
      border: 1px solid #3a3a4a;
      padding: 7px 13px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.82rem;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      letter-spacing: 0.2px;
    }

    button:hover {
      background-color: #38384a;
      color: #fff;
      border-color: #505060;
    }

    button#play {
      background-color: #0a6fd8;
      border-color: #0060c0;
      color: #fff;
    }
    button#play:hover {
      background-color: #1a7fe8;
    }

    button#stop {
      background-color: #2a2a38;
      border-color: #3a3a4a;
    }

    button#marker {
      background-color: #c0392b;
      border-color: #a93226;
      color: #fff;
    }
    button#marker:hover {
      background-color: #e74c3c;
    }

    button#loopBtn {
      background-color: #2a2a38;
      border-color: #3a3a4a;
      color: #aaa;
      position: relative;
    }
    button#loopBtn.active {
      background-color: #1a3d28;
      border-color: #30d158;
      color: #30d158;
      box-shadow: 0 0 10px rgba(48, 209, 88, 0.25);
    }

    button#loopRestart {
      background-color: #2a2a38;
      border-color: #3a3a4a;
      color: #aaa;
    }
    button#loopRestart:active {
      background-color: #1a3d28;
      border-color: #30d158;
      color: #30d158;
    }

    /* SPEED CONTROL */
    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1c1c24;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #2a2a35;
    }

    .speed-control label {
      font-size: 0.78rem;
      color: #9a9a9e;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    #speedLabel {
      font-size: 0.85rem;
      font-family: 'Courier New', monospace;
      color: #007aff;
      font-weight: bold;
      min-width: 38px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 110px;
      height: 4px;
      border-radius: 2px;
      background: #3a3a4a;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #007aff;
      cursor: pointer;
      border: 2px solid #1c1c24;
      transition: background 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #268fff;
    }

    /* STATUS BAR */
    #status {
      margin: 0;
      font-size: 0.78rem;
      color: #6a6a7e;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* WAVEFORM AREA */
    .waveform-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #26262e;
      background-color: #0c0c10;
      box-shadow: inset 0 4px 20px rgba(0,0,0,0.6);
    }

    /* TIMELINE */
    #timeline-container {
      height: 30px;
      overflow: hidden;
      flex-shrink: 0;
      border-bottom: 1px solid #1e1e28;
      position: relative;
    }

    #timeline-canvas {
      display: block;
      height: 30px;
    }

    /* WAVEFORM */
    #waveform-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #waveform {
      width: 100%;
      height: 100%;
    }

    /* INFO ROW */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    kbd {
      display: inline-block;
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      color: #6a6a7e;
      background: #13131a;
      border: 1px solid #3a3a4a;
      border-radius: 3px;
      padding: 0px 4px;
      margin-left: 4px;
      vertical-align: middle;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <h1>LOOP<span>ER</span></h1>
    <div id="timeDisplay">00.00 / 00.00</div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button id="load">Carica Audio</button>

    <div class="divider"></div>

    <button id="play">▶ Play / Pausa <kbd>P</kbd></button>
    <button id="stop">■ Stop <kbd>O</kbd></button>
    <button id="marker">◆ Marker <kbd>M</kbd></button>
    <button id="loopBtn">⟳ Loop <kbd>L</kbd></button>
    <button id="loopRestart">↩ Ricomincia <kbd>K</kbd></button>

    <div class="divider"></div>

    <button id="zoomIn">＋ Zoom <kbd>+</kbd></button>
    <button id="zoomOut">－ Zoom <kbd>-</kbd></button>
    <button id="zoomReset">Adatta</button>

    <div class="divider"></div>

    <button id="saveProject">Salva</button>
    <button id="loadProject">Apri</button>
  </div>

  <!-- SPEED + STATUS -->
  <div class="info-row">
    <p id="status">Nessun file caricato — usa "Carica Audio" per iniziare.</p>
    <div class="speed-control">
      <label>VOLUME</label>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
      <span id="volumeLabel">100%</span>
    </div>
    <div class="speed-control">
      <label>VELOCITÀ</label>
      <input type="range" id="speedSlider" min="0.25" max="2" step="0.05" value="1" />
      <span id="speedLabel">1.00x</span>
    </div>
  </div>

  <!-- WAVEFORM + TIMELINE -->
  <div class="waveform-area">
    <div id="timeline-container">
      <canvas id="timeline-canvas" height="30"></canvas>
    </div>
    <div id="waveform-container">
      <div id="waveform"></div>
    </div>
  </div>

  <script type="module" src="/renderer.js"></script>
</body>
</html>
